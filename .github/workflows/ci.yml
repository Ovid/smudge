name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run typecheck

  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Run tests with coverage
        run: make cover
      - run: npm run build -w packages/client

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: make e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            playwright-report/
          retention-days: 7

  dep-cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # --ignore-scripts: this is a supply-chain gate, so it must NOT execute a
      # fresh (potentially malicious) dependency's install/postinstall scripts on
      # the runner before it has a chance to block the merge. The gate reads only
      # package-lock.json + scripts/ (node built-ins, no third-party imports), so
      # skipping lifecycle scripts costs nothing here.
      - run: npm ci --ignore-scripts
      # Persist publish-time lookups across runs. Entries are immutable
      # (name@version -> publish date), so we want the cache to ACCUMULATE, not
      # reset whenever the lockfile changes. The `key` is per-run-unique
      # (github.run_id), so it NEVER restore-hits — every run therefore saves a
      # fresh superset at job end, persisting the dates it fetched. A
      # hash-keyed `key` would skip the save on the common stable-lockfile run
      # (exact-key restore hit => no save), so dates fetched that run would be
      # re-fetched next time. The stable `restore-keys` prefix restores the most
      # recent prior cache, so each run fetches only what is new. (S3)
      #
      # TRUST BOUNDARY: the gate trusts cached publish dates AS-IS (no integrity
      # check), so a forged entry could make a young package read as old. This
      # is acceptable because (1) GitHub scopes caches per-branch — a run on
      # `main` (the authoritative gate) restores only main/base caches, so a
      # feature-branch or fork cache cannot be injected onto main; and (2) the
      # gate is an age PROXY by design — artifact integrity is enforced
      # separately by `npm ci`'s lockfile `integrity` hashes, which a forged
      # publish DATE does not touch. The accumulation benefit (not re-fetching
      # ~770 metadata docs per run) is worth this documented residual risk; see
      # docs/superpowers/specs/2026-06-01-dependency-cooldown-design.md.
      - name: Restore dependency-cooldown publish-time cache
        uses: actions/cache@v4
        with:
          path: .dep-cooldown-cache.json
          key: dep-cooldown-${{ github.run_id }}
          restore-keys: |
            dep-cooldown-
      - run: make dep-cooldown
